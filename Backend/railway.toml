# =============================================================================
# Railway service config — Backend (FastAPI + RAG engine)
# =============================================================================
# In Railway dashboard:
#   1. Create a new Service inside your project.
#   2. Connect your GitHub repo and set the "Root Directory" to "Backend".
#   3. Railway will find this file and use the Dockerfile builder.
#   4. Add a Volume to persist the embedding cache (one-time setup):
#        Dashboard → your service → Volumes tab → "New Volume"
#        Mount path: /app/.index_cache
#      Railway automatically injects RAILWAY_VOLUME_MOUNT_PATH=/app/.index_cache
#      at runtime; JAG-GPT.py reads that variable so the index is saved to the
#      volume on first run and reloaded from it on every subsequent start.
#      No manual env var is needed for the cache path.
#   5. Set these environment variables in the Railway service settings:
#        OLLAMA_API_KEY          = <your Ollama API key>
#        JAG_EMBED_DEVICE        = cpu
#        JAG_JSON_PATH           = /app/AI_Work/regs_combined.json
#        CORS_ORIGINS            = https://<your-frontend>.up.railway.app
#
# How the cache works:
#   • First deploy (empty volume): builds VectorStoreIndex from regs_combined.json
#     (~5-30 min). /ping returns 200 immediately; /health returns 503 until done.
#   • Subsequent deploys: loads index from /app/.index_cache in ~30 seconds.
#   • Cache is invalidated automatically when regs_combined.json size changes
#     (i.e. when regulations are updated) or if chunk/model settings change.
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects $PORT at runtime; the Dockerfile CMD honours it.
# /ping returns 200 as soon as uvicorn is accepting connections — used here
# so Railway does not restart the service while the FAISS index is being
# built on the first deploy (can take 5–30 min on an empty volume).
# /health is the full readiness check (returns 503 until JAG-GPT is loaded);
# use it with docker-compose depends_on but NOT as Railway's healthcheckPath.
healthcheckPath    = "/ping"
healthcheckTimeout = 7000
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 3
