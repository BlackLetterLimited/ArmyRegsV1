# =============================================================================
# Railway service config — Backend (FastAPI + RAG engine)
# =============================================================================
#
# RECOMMENDED DEPLOY WORKFLOW (pre-built image — no Railway indexing cost):
# ─────────────────────────────────────────────────────────────────────────
#   1. Build the FAISS index locally (one-time, then only when regs change):
#        cd Backend
#        python build_cache.py          # writes to Backend/API/.index_cache/
#
#   2. Build the Docker image and push to GHCR:
#        .\build_and_push.ps1 -ImageTag ghcr.io/YOUR_USERNAME/jaggpt-backend:latest
#
#   3. In the Railway dashboard, switch the service source to the pre-built image:
#        Service → Settings → Source → Docker Image
#        Image: ghcr.io/YOUR_USERNAME/jaggpt-backend:latest
#
#   4. Set these Railway environment variables:
#        OLLAMA_API_KEY           = <your Ollama API key>
#        JAG_EMBED_DEVICE         = cpu
#        JAG_JSON_PATH            = /app/AI_Work/regs_combined.json
#        JAG_INDEX_CACHE_DIR      = /app/.index_cache   ← forces baked-in cache
#        CORS_ORIGINS             = https://<your-frontend>.up.railway.app
#
#   For private GHCR images also add:
#        RAILWAY_PRIVATE_REGISTRY_SERVER   = ghcr.io
#        RAILWAY_PRIVATE_REGISTRY_USERNAME = your-github-username
#        RAILWAY_PRIVATE_REGISTRY_PASSWORD = your-github-PAT (read:packages scope)
#
# WHY THIS APPROACH:
#   The FAISS index is large binary data (~hundreds of MB) and is gitignored.
#   When Railway builds from GitHub source it has no pre-built cache, so every
#   deploy triggers a 5–30 minute indexing run.  By baking the cache into the
#   Docker image locally and deploying that image, Railway just pulls and runs —
#   cold starts take ~30 seconds regardless of how often you redeploy.
#
# WHEN TO REBUILD THE CACHE:
#   Only when regs_combined.json changes (new/updated regulations) or when
#   CHUNK_SIZE, CHUNK_OVERLAP, or the embedding model changes.  Code-only
#   changes to JAG-GPT.py or JAG-GPT-API.py do NOT require a cache rebuild —
#   just rebuild and push the Docker image without running build_cache.py again.
#
# NOTE: Do NOT attach a Railway Volume to /app/.index_cache when using this
#   workflow.  A volume at that path would shadow the baked-in cache.
#   JAG_INDEX_CACHE_DIR=/app/.index_cache overrides RAILWAY_VOLUME_MOUNT_PATH
#   in case a volume is accidentally attached.
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# When Railway is configured to deploy from a pre-built Docker image (recommended),
# this [build] section is ignored — Railway just pulls from the registry.

[deploy]
healthcheckPath    = "/ping"
healthcheckTimeout = 7000
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 3
